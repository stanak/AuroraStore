name: Build and Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Restore signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          CLEANED_KEYSTORE_B64="$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')"
          if [ -z "$CLEANED_KEYSTORE_B64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty after trimming whitespace."
            exit 1
          fi

          printf '%s' "$CLEANED_KEYSTORE_B64" | base64 --decode --ignore-garbage > app/release-keystore.jks

          if [ ! -s app/release-keystore.jks ]; then
            echo "Decoded keystore file is empty."
            exit 1
          fi

      - name: Create signing.properties
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cat > signing.properties <<EOF
          KEY_ALIAS=$ANDROID_KEY_ALIAS
          KEY_PASSWORD=$ANDROID_KEY_PASSWORD
          STORE_FILE=release-keystore.jks
          EOF

      - name: Build vanilla release APK
        run: ./gradlew :app:assembleVanillaRelease --no-daemon

      - name: Collect release APK path
        id: apk
        run: |
          SIGNED_APK=$(ls app/build/outputs/apk/vanilla/release/*release*.apk | grep -v "unsigned" | head -n 1 || true)
          UNSIGNED_APK=$(ls app/build/outputs/apk/vanilla/release/*unsigned*.apk | head -n 1 || true)
          if [ -n "$SIGNED_APK" ]; then
            echo "apk_path=$SIGNED_APK" >> "$GITHUB_OUTPUT"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "apk_path=$UNSIGNED_APK" >> "$GITHUB_OUTPUT"
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurorastore-vanilla-release-apk
          path: ${{ steps.apk.outputs.apk_path }}

      - name: Create GitHub release and upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          generate_release_notes: true
          body: |
            Built from `${{ github.ref_name }}`.
            Signed APK: `${{ steps.apk.outputs.signed }}`
